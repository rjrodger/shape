name: build-go

on: ['push']

jobs:
  build-go:
    timeout-minutes: 6

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.22.x']

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: go

    steps:
    - uses: actions/checkout@v4
    - name: Use Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: false
    - run: go build ./...
    - run: go test -v ./...
