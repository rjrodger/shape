# Build, vet and test the Go implementation in ./go across platforms.

name: go-build

on: ['push']

jobs:
  build:
    timeout-minutes: 6

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.22.x', '1.23.x']

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: go

    steps:
      - uses: actions/checkout@v4
      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: false
      - run: go version
      - run: go vet ./...
      - run: go build ./...
      - run: go test -v ./...
